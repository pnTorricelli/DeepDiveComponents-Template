<form (ngSubmit)="onSubmit(enterTitle,enterRequest)" #form>
  <app-control label="Title">
    <input name="title" id="title" #enterTitle #input />
  </app-control>
  <app-control label="Request">
    <textarea name="request" id="request" rows="3" #enterRequest #input></textarea>
  </app-control>
  <p>
    <button appButton>Submit <span ngProjectAs="icon">⌲</span></button>
  </p>
</form>
